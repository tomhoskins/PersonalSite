<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book Tracker — Tom Hoskins</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />

  <!-- CSS -->
  <link rel="stylesheet" href="../css/reset.css" />
  <link rel="stylesheet" href="../css/variables.css" />
  <link rel="stylesheet" href="../css/typography.css" />
  <link rel="stylesheet" href="../css/layout.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/animations.css" />
  <link rel="stylesheet" href="../css/responsive.css" />
</head>
<body>

  <!-- ── Page Hero ── -->
  <header class="page-hero">

    <a href="../index.html" class="scroll-btn scroll-btn--up" aria-label="Return to the Keep">
      <svg class="scroll-btn-arrow" viewBox="0 0 24 24" fill="none"
           xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M12 19 L12 5 M5 11 L12 4 L19 11"
              stroke="currentColor" stroke-width="1.6"
              stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="scroll-btn-text">Return to the Keep</span>
    </a>

    <!-- Ornate divider -->
    <svg class="hero-divider" viewBox="0 0 480 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <line x1="0"   y1="12" x2="190" y2="12" stroke="url(#books-div-l)" stroke-width="0.8"/>
      <line x1="290" y1="12" x2="480" y2="12" stroke="url(#books-div-r)" stroke-width="0.8"/>
      <path d="M220 12 L228 6 L236 12 L228 18 Z" fill="none" stroke="#D4A017" stroke-width="1"/>
      <circle cx="228" cy="12" r="2.5" fill="#D4A017"/>
      <circle cx="210" cy="12" r="1.5" fill="rgba(212,160,23,0.6)"/>
      <circle cx="246" cy="12" r="1.5" fill="rgba(212,160,23,0.6)"/>
      <path d="M190 12 Q200 4 210 12 Q220 20 230 12" fill="none" stroke="rgba(212,160,23,0.5)" stroke-width="0.8"/>
      <path d="M290 12 Q280 4 270 12 Q260 20 250 12" fill="none" stroke="rgba(212,160,23,0.5)" stroke-width="0.8"/>
      <defs>
        <linearGradient id="books-div-l" x1="0" y1="0" x2="190" y2="0" gradientUnits="userSpaceOnUse">
          <stop offset="0%"   stop-color="#D4A017" stop-opacity="0"/>
          <stop offset="100%" stop-color="#D4A017" stop-opacity="0.6"/>
        </linearGradient>
        <linearGradient id="books-div-r" x1="290" y1="0" x2="480" y2="0" gradientUnits="userSpaceOnUse">
          <stop offset="0%"   stop-color="#D4A017" stop-opacity="0.6"/>
          <stop offset="100%" stop-color="#D4A017" stop-opacity="0"/>
        </linearGradient>
      </defs>
    </svg>

    <!-- Icon -->
    <div class="card--books">
      <svg class="page-icon card-icon" viewBox="0 0 54 54" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <!-- Book spine -->
        <line x1="27" y1="12" x2="27" y2="44" stroke="currentColor" stroke-width="1.4"/>
        <!-- Left page -->
        <path d="M27 12 Q18 10 10 14 L10 44 Q18 40 27 44 Z"
              fill="currentColor" opacity="0.3" stroke="currentColor" stroke-width="1"/>
        <!-- Right page -->
        <path d="M27 12 Q36 10 44 14 L44 44 Q36 40 27 44 Z"
              fill="currentColor" opacity="0.3" stroke="currentColor" stroke-width="1"/>
        <!-- Lines on left page -->
        <line x1="13" y1="20" x2="24" y2="19" stroke="currentColor" stroke-width="0.8" opacity="0.6"/>
        <line x1="13" y1="25" x2="24" y2="24" stroke="currentColor" stroke-width="0.8" opacity="0.6"/>
        <line x1="13" y1="30" x2="22" y2="29" stroke="currentColor" stroke-width="0.8" opacity="0.6"/>
        <!-- Lines on right page -->
        <line x1="30" y1="19" x2="41" y2="20" stroke="currentColor" stroke-width="0.8" opacity="0.6"/>
        <line x1="30" y1="24" x2="41" y2="25" stroke="currentColor" stroke-width="0.8" opacity="0.6"/>
        <line x1="30" y1="29" x2="39" y2="30" stroke="currentColor" stroke-width="0.8" opacity="0.6"/>
        <!-- Stars/magic above book -->
        <circle cx="27" cy="7"  r="1.5" fill="currentColor" opacity="0.8"/>
        <circle cx="21" cy="9"  r="1"   fill="currentColor" opacity="0.5"/>
        <circle cx="33" cy="9"  r="1"   fill="currentColor" opacity="0.5"/>
      </svg>
    </div>

    <span class="page-label">The Arcane Library</span>
    <h1 class="page-title" style="color: #6B9FD4;">Book Tracker</h1>

    <!-- Ornate divider -->
    <svg class="hero-divider" viewBox="0 0 480 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <line x1="0"   y1="12" x2="190" y2="12" stroke="url(#books-div-l2)" stroke-width="0.8"/>
      <line x1="290" y1="12" x2="480" y2="12" stroke="url(#books-div-r2)" stroke-width="0.8"/>
      <path d="M220 12 L228 6 L236 12 L228 18 Z" fill="none" stroke="#D4A017" stroke-width="1"/>
      <circle cx="228" cy="12" r="2.5" fill="#D4A017"/>
      <circle cx="210" cy="12" r="1.5" fill="rgba(212,160,23,0.6)"/>
      <circle cx="246" cy="12" r="1.5" fill="rgba(212,160,23,0.6)"/>
      <path d="M190 12 Q200 4 210 12 Q220 20 230 12" fill="none" stroke="rgba(212,160,23,0.5)" stroke-width="0.8"/>
      <path d="M290 12 Q280 4 270 12 Q260 20 250 12" fill="none" stroke="rgba(212,160,23,0.5)" stroke-width="0.8"/>
      <defs>
        <linearGradient id="books-div-l2" x1="0" y1="0" x2="190" y2="0" gradientUnits="userSpaceOnUse">
          <stop offset="0%"   stop-color="#D4A017" stop-opacity="0"/>
          <stop offset="100%" stop-color="#D4A017" stop-opacity="0.6"/>
        </linearGradient>
        <linearGradient id="books-div-r2" x1="290" y1="0" x2="480" y2="0" gradientUnits="userSpaceOnUse">
          <stop offset="0%"   stop-color="#D4A017" stop-opacity="0.6"/>
          <stop offset="100%" stop-color="#D4A017" stop-opacity="0"/>
        </linearGradient>
      </defs>
    </svg>

  </header>

  <main class="page-content">
    <p>The shelves are being catalogued. The tomes will be ready for study soon.</p>
  </main>

  <footer class="site-footer">
    <svg class="footer-divider" viewBox="0 0 500 28" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <line x1="0"   y1="14" x2="200" y2="14" stroke="url(#books-foot-l)" stroke-width="0.8"/>
      <line x1="300" y1="14" x2="500" y2="14" stroke="url(#books-foot-r)" stroke-width="0.8"/>
      <path d="M240 14 L248 8 L256 14 L248 20 L240 14Z" fill="none" stroke="#8B6914" stroke-width="1"/>
      <path d="M248 8 L248 2 M248 20 L248 26" stroke="#8B6914" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>
      <circle cx="248" cy="14" r="2" fill="#8B6914"/>
      <circle cx="230" cy="14" r="1.2" fill="rgba(139,105,20,0.5)"/>
      <circle cx="266" cy="14" r="1.2" fill="rgba(139,105,20,0.5)"/>
      <path d="M200 14 Q212 6 224 14 Q212 22 200 14Z" fill="rgba(139,105,20,0.2)" stroke="#8B6914" stroke-width="0.6"/>
      <path d="M300 14 Q288 6 276 14 Q288 22 300 14Z" fill="rgba(139,105,20,0.2)" stroke="#8B6914" stroke-width="0.6"/>
      <defs>
        <linearGradient id="books-foot-l" x1="0" y1="0" x2="200" y2="0" gradientUnits="userSpaceOnUse">
          <stop offset="0%"   stop-color="#8B6914" stop-opacity="0"/>
          <stop offset="100%" stop-color="#8B6914" stop-opacity="0.6"/>
        </linearGradient>
        <linearGradient id="books-foot-r" x1="300" y1="0" x2="500" y2="0" gradientUnits="userSpaceOnUse">
          <stop offset="0%"   stop-color="#8B6914" stop-opacity="0.6"/>
          <stop offset="100%" stop-color="#8B6914" stop-opacity="0"/>
        </linearGradient>
      </defs>
    </svg>
    <p>Forged in <code>&lt;/&gt;</code> &middot; &copy; <span id="footer-year"></span> Tom Hoskins</p>
  </footer>

  <script>
    document.getElementById('footer-year').textContent = new Date().getFullYear();
  </script>

</body>
</html>
